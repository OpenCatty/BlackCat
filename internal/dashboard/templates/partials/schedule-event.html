{{define "schedule-event"}}
<div class="schedule-event-detail">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
    <strong style="font-size: 0.95em;">{{.Name}}</strong>
    <span class="calendar-event calendar-event-{{.Status}}">{{.Status}}</span>
  </div>
  {{if .TimeStr}}
  <div style="color: #8b949e; font-size: 0.85em; margin-bottom: 0.4rem;">
    <strong>Time:</strong> {{.TimeStr}}
  </div>
  {{end}}
  <div style="display: flex; gap: 0.4rem; margin-top: 0.5rem;">
    {{if .IsProjected}}
    <span class="calendar-event calendar-event-projected">projected</span>
    {{end}}
    {{if .IsHighFreq}}
    <span class="badge badge-running" style="font-size: 0.75em; padding: 2px 6px;">high-freq</span>
    {{end}}
  </div>
</div>
{{end}}
