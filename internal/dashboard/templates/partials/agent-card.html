{{define "agent-card"}}
<div class="card" id="agent-{{.Name}}">
  <strong>{{.Name}}</strong>
  <span class="badge badge-{{.State}}">{{.State}}</span>
  <div style="color: #8b949e; font-size: 0.9em; margin-top: 0.5rem;">
    {{if .CurrentTask}}Task: {{.CurrentTask}}{{end}}
    <br>Last active: {{.LastActive}}
  </div>
</div>
{{end}}
