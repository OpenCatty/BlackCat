{{define "content"}}
<style>
  .login-container {
    max-width: 400px;
    margin: 4rem auto;
  }
  .login-header {
    margin-top: 0;
    color: #c9d1d9;
    border-bottom: 1px solid #30363d;
    padding-bottom: 0.75rem;
    margin-bottom: 1.5rem;
    font-size: 1.25rem;
  }
  .error {
    color: #f85149;
    background: #da363326;
    padding: 0.75rem;
    border-radius: 6px;
    margin-bottom: 1.5rem;
    border: 1px solid #da36334d;
  }
  .form-group {
    margin-bottom: 1.5rem;
  }
  .form-group label {
    display: block;
    margin-bottom: 0.5rem;
    color: #8b949e;
    font-weight: bold;
  }
  .form-control {
    width: 100%;
    box-sizing: border-box;
    background: #0d1117;
    border: 1px solid #30363d;
    color: #c9d1d9;
    padding: 0.5rem 0.75rem;
    border-radius: 6px;
    font-family: monospace;
    transition: border-color 0.2s;
  }
  .form-control:focus {
    outline: none;
    border-color: #58a6ff;
  }
  .btn-submit {
    background: #21262d;
    color: #58a6ff;
    border: 1px solid #30363d;
    padding: 0.6rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: monospace;
    font-weight: bold;
    width: 100%;
    transition: background 0.2s, border-color 0.2s;
  }
  .btn-submit:hover {
    background: #30363d;
    border-color: #8b949e;
  }
</style>

<div class="login-container">
  <div class="card">
    <h2 class="login-header">BlackCat Login</h2>
    
    <form method="POST" action="/dashboard/login">
      {{if .Error}}
      <div class="error">{{.Error}}</div>
      {{end}}
      
      <div class="form-group">
        <label for="token">Access Token</label>
        <input type="password" id="token" name="token" class="form-control" autofocus required autocomplete="current-password">
      </div>
      
      <input type="hidden" name="next" value="{{.Next}}">
      
      <button type="submit" class="btn-submit">Authenticate</button>
    </form>
  </div>
</div>
{{end}}
