{{define "content"}}
<h2>System Overview</h2>
<div id="health-indicator" hx-ext="sse" sse-connect="/dashboard/events" sse-swap="heartbeat">
  <div class="card">
    <strong>Overall Status:</strong> <span class="badge badge-healthy">Healthy</span>
  </div>
</div>
<div class="card">
  <strong>Active Subsystems:</strong> <span id="subsystem-count">{{.SubsystemCount}}</span>
</div>
<div class="card">
  <strong>Uptime:</strong> <span id="uptime">{{.Uptime}}</span>
</div>
{{end}}
