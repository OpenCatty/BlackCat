<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>BlackCat Dashboard</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
  <style>
    /* Minimal styles: dark bg, clean cards, status badges */
    body { font-family: monospace; background: #0d1117; color: #c9d1d9; margin: 0; padding: 0; }
    nav { background: #161b22; padding: 1rem 2rem; border-bottom: 1px solid #30363d; }
    nav a { color: #58a6ff; text-decoration: none; margin-right: 1.5rem; }
    main { padding: 2rem; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 1rem; margin-bottom: 1rem; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.8em; }
    .badge-idle { background: #21262d; color: #8b949e; }
    .badge-running { background: #388bfd26; color: #58a6ff; }
    .badge-failed { background: #da363326; color: #f85149; }
    .badge-healthy { background: #23863626; color: #3fb950; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 0.5rem; border-bottom: 1px solid #21262d; }
    th { color: #8b949e; font-weight: normal; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .calendar-day { min-height: 80px; padding: 4px; border: 1px solid #21262d; }
    .calendar-day-pad { opacity: 0.4; }
    .calendar-today { border-color: #58a6ff; }
    .calendar-event { font-size: 0.75em; padding: 2px 4px; border-radius: 3px; margin-top: 2px; white-space: nowrap; overflow: hidden; }
    .calendar-event-ok { background: #23863626; color: #3fb950; }
    .calendar-event-failed { background: #da363326; color: #f85149; }
    .calendar-event-scheduled { background: #21262d; color: #8b949e; }
    .calendar-event-running { background: #388bfd26; color: #58a6ff; }
    .hb-ok { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #3fb950; }
    .hb-fail { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #f85149; }
    .hb-none { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #30363d; }
    .month-nav { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
    .month-nav a { color: #58a6ff; cursor: pointer; }
  </style>
</head>
<body>
  <nav>
    <strong>BlackCat</strong>
    <a href="/dashboard/">Overview</a>
    <a href="#" hx-get="/dashboard/agents" hx-target="#main-content" hx-push-url="true">Agents</a>
    <a href="#" hx-get="/dashboard/tasks" hx-target="#main-content" hx-push-url="true">Tasks</a>
    <a href="#" hx-get="/dashboard/schedule" hx-target="#main-content" hx-push-url="true">Schedule</a>
  </nav>
  <main id="main-content">
    {{template "content" .}}
  </main>
</body>
</html>
