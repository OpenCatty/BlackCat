{{define "content"}}
<h2>Task History</h2>
<table>
  <thead><tr><th>Name</th><th>Status</th><th>Duration</th><th>Last Run</th></tr></thead>
  <tbody id="task-list" hx-ext="sse" sse-connect="/dashboard/events" sse-swap="task-update">
    {{range .Tasks}}
      {{template "task-row" .}}
    {{end}}
  </tbody>
</table>
<div hx-get="/dashboard/tasks?page={{.NextPage}}" hx-trigger="revealed" hx-target="#task-list" hx-swap="beforeend">
  Loading more...
</div>
{{end}}
